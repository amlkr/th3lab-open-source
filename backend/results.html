<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>th3lab — analysis results</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #ddd;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 40px;
    }

    /* ── Page wrapper ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding-bottom: 24px;
      margin-bottom: 40px;
      border-bottom: 1px solid #161616;
    }

    .page-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #8b5cf6;
    }

    .page-sub {
      font-size: 10px;
      color: #2e2e2e;
    }

    /* ── States ── */
    .state {
      padding: 80px 0;
      text-align: center;
      font-size: 12px;
      color: #2a2a2a;
    }

    .state.error { color: #ef4444; }

    /* ── Job card ── */
    .job-card {
      background: #0c0c0c;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 48px;
    }

    /* ── Card top: coherence + meta ── */
    .card-top {
      padding: 28px 32px 24px;
      border-bottom: 1px solid #141414;
      display: flex;
      align-items: flex-end;
      gap: 40px;
    }

    .coherence-block {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .coherence-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8b5cf6;
    }

    .coherence-score {
      font-size: 52px;
      font-weight: 500;
      line-height: 1;
      color: #a78bfa;
      letter-spacing: -0.02em;
    }

    .coherence-unit {
      font-size: 16px;
      color: #4c3d8a;
    }

    .meta-blocks {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      gap: 32px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .meta-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b5cf6;
    }

    .meta-value {
      font-size: 12px;
      color: #888;
    }

    .card-date {
      margin-left: auto;
      font-size: 10px;
      color: #252525;
      align-self: flex-start;
    }

    /* ── Report section ── */
    .card-report {
      padding: 28px 32px;
      border-bottom: 1px solid #141414;
    }

    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #8b5cf6;
      margin-bottom: 14px;
    }

    .report-text {
      font-size: 14px;
      line-height: 1.8;
      color: #999;
      white-space: pre-wrap;
    }

    /* ── Image rows ── */
    .card-images {
      padding: 24px 32px 32px;
    }

    .img-row {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
      border-bottom: 1px solid #111;
    }

    .img-row:last-child {
      border-bottom: none;
    }

    /* Thumbnail */
    .img-thumb {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 3px;
      background: #111;
      flex-shrink: 0;
      display: block;
    }

    .img-thumb-placeholder {
      width: 120px;
      height: 80px;
      border-radius: 3px;
      background: #111;
      border: 1px solid #1c1c1c;
      flex-shrink: 0;
    }

    /* Info column */
    .img-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .img-filename {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Single metadata line */
    .img-meta-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Scale badge — per-scale colour */
    .scale-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 3px;
      color: #e0d4ff;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .scale-ECS { background: #4c1d95; }
    .scale-CS  { background: #5b21b6; }
    .scale-MS  { background: #6d28d9; }
    .scale-FS  { background: #7c3aed; }
    .scale-LS  { background: #8b5cf6; }
    .scale-    { background: #2a1f50; }

    .meta-sep {
      color: #252525;
      font-size: 11px;
      flex-shrink: 0;
    }

    .meta-ref {
      font-size: 11px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .meta-atmo {
      font-size: 11px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Second detail line */
    .img-detail-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tension-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #333;
    }

    .t-baja    { color: #6ee7b7; }
    .t-media   { color: #fcd34d; }
    .t-alta    { color: #fb923c; }
    .t-extrema { color: #f87171; }

    .colors {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .color-chip {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      background: #161616;
      border: 1px solid #1e1e1e;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <span class="page-title">th3lab / results</span>
      <span class="page-sub">completed image analyses</span>
    </header>
    <div id="root">
      <p class="state">loading...</p>
    </div>
  </div>

  <script>
    const API = window.location.origin

    const SCALE_COLORS = { ECS: '#4c1d95', CS: '#5b21b6', MS: '#6d28d9', FS: '#7c3aed', LS: '#8b5cf6' }

    function tensionClass(t) {
      if (!t) return ''
      switch (t.toLowerCase()) {
        case 'extrema': return 't-extrema'
        case 'alta':    return 't-alta'
        case 'media':   return 't-media'
        default:        return 't-baja'
      }
    }

    function esc(s) {
      if (s == null) return '—'
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    function scaleBadge(scale) {
      const cls = `scale-badge scale-${scale || ''}`
      return `<span class="${cls}">${esc(scale) || '—'}</span>`
    }

    function renderImageRow(img, filename, thumbUrl) {
      const thumb = thumbUrl
        ? `<img class="img-thumb" src="${thumbUrl}" alt="${esc(filename)}" loading="lazy" />`
        : `<div class="img-thumb-placeholder"></div>`

      const colors = Array.isArray(img.dominant_colors) && img.dominant_colors.length
        ? img.dominant_colors.map(c => `<span class="color-chip">${esc(c)}</span>`).join('')
        : ''

      const tension = img.emotional_tension
        ? `<span class="tension-label ${tensionClass(img.emotional_tension)}">${esc(img.emotional_tension)}</span>`
        : ''

      return `
        <div class="img-row">
          ${thumb}
          <div class="img-info">
            <div class="img-filename">${esc(filename)}</div>
            <div class="img-meta-line">
              ${scaleBadge(img.shot_scale)}
              <span class="meta-sep">·</span>
              <span class="meta-ref">${esc(img.cinematic_reference)}</span>
              <span class="meta-sep">·</span>
              <span class="meta-atmo">${esc(img.atmosphere)}</span>
            </div>
            <div class="img-detail-line">
              ${tension}
              ${colors ? `<span class="meta-sep" style="margin-left:4px">·</span>` : ''}
              <div class="colors">${colors}</div>
            </div>
          </div>
        </div>`
    }

    function renderJob(job) {
      const r         = job.result || {}
      const coherence = r.coherence?.score ?? (typeof r.coherence === 'number' ? r.coherence : null)
      const analysis  = r.semantic_analysis || []
      const filenames = job.input_data?.filenames || []
      const imgPaths  = job.input_data?.image_paths || []
      const report    = r.report || ''
      const imgCount  = r.image_count ?? analysis.length
      const jobId     = job.job_id

      const date = new Date(job.created_at).toLocaleString('es-AR', {
        day: '2-digit', month: '2-digit', year: '2-digit',
        hour: '2-digit', minute: '2-digit',
      })

      // Build thumbnail URLs from stored full paths: /tmp/amlkr-uploads/{jobId}_{filename}
      const thumbUrls = imgPaths.map(p => {
        const base = p.split('/').pop()  // e.g. "abc123_photo.jpg"
        return base ? `${API}/uploads/${encodeURIComponent(base)}` : null
      })

      const rowsHtml = analysis.length
        ? analysis.map((img, i) =>
            renderImageRow(img, filenames[i] || `imagen ${i + 1}`, thumbUrls[i] || null)
          ).join('')
        : `<p style="font-size:11px;color:#2a2a2a;padding:16px 0">sin datos de imágenes</p>`

      return `
        <div class="job-card">

          <div class="card-top">
            <div class="coherence-block">
              <span class="coherence-label">coherencia CLIP</span>
              <span class="coherence-score">
                ${coherence != null ? coherence.toFixed(1) : '—'}<span class="coherence-unit">/100</span>
              </span>
            </div>
            <div class="meta-blocks">
              <div class="meta-row">
                <div class="meta-item">
                  <span class="meta-label">imágenes</span>
                  <span class="meta-value">${imgCount}</span>
                </div>
                <div class="meta-item">
                  <span class="meta-label">tipo</span>
                  <span class="meta-value">${esc(job.job_type)}</span>
                </div>
              </div>
              <div class="meta-item">
                <span class="meta-label">job id</span>
                <span class="meta-value" style="color:#252525;font-size:10px">${esc(jobId)}</span>
              </div>
            </div>
            <span class="card-date">${date}</span>
          </div>

          ${report ? `
          <div class="card-report">
            <div class="section-label">informe narrativo</div>
            <p class="report-text">${esc(report)}</p>
          </div>` : ''}

          <div class="card-images">
            <div class="section-label">desglose por imagen</div>
            ${rowsHtml}
          </div>

        </div>`
    }

    async function load() {
      const root = document.getElementById('root')
      try {
        const listRes = await fetch(`${API}/api/jobs/?status=completed&job_type=images&limit=50`)
        if (!listRes.ok) throw new Error(`${listRes.status} ${listRes.statusText}`)

        const { jobs } = await listRes.json()

        if (!jobs.length) {
          root.innerHTML = '<p class="state">no completed image jobs yet</p>'
          return
        }

        const details = await Promise.all(
          jobs.map(j =>
            fetch(`${API}/api/jobs/${j.job_id}`)
              .then(r => { if (!r.ok) throw new Error(r.status); return r.json() })
          )
        )

        root.innerHTML = details.map(renderJob).join('')
      } catch (err) {
        root.innerHTML = `<p class="state error">error: ${esc(err.message)}</p>`
      }
    }

    load()
  </script>
</body>
</html>
