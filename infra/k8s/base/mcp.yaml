apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/amlkr/th3lab-mcp:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: th3lab-config
          ports:
            - containerPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector:
    app: mcp
  ports:
    - port: 8090
      targetPort: 8090
