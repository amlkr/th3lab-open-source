apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:1.83.2
          imagePullPolicy: IfNotPresent
          env:
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "http"
            - name: N8N_HOST
              value: "n8n"
            - name: N8N_EDITOR_BASE_URL
              value: "http://n8n:5678"
            - name: WEBHOOK_URL
              value: "http://n8n:5678"
            - name: N8N_ENCRYPTION_KEY
              value: "change-me-phase2"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
spec:
  selector:
    app: n8n
  ports:
    - port: 5678
      targetPort: 5678
