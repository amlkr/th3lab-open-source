services:
  postgres:
    image: postgres:16-alpine
    container_name: th3lab_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: th3lab_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: th3lab_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      CHROMA_PATH: ${CHROMA_PATH}
      UPLOAD_DIR: ${UPLOAD_DIR}
    volumes:
      - ../../backend:/app
      - upload_tmp:/app/tmp
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: th3lab_celery
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2 -Q video,images,reports,rag
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      CHROMA_PATH: ${CHROMA_PATH}
      UPLOAD_DIR: ${UPLOAD_DIR}
    volumes:
      - ../../backend:/app
      - upload_tmp:/app/tmp
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mcp:
    build:
      context: ../mcp
      dockerfile: Dockerfile
    container_name: th3lab_mcp
    environment:
      MCP_BACKEND_URL: ${MCP_BACKEND_URL}
      MCP_PROJECT_ROOT: ${MCP_PROJECT_ROOT}
    ports:
      - "${MCP_PORT}:8090"
    volumes:
      - ../../:/workspace
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:1.83.2
    container_name: th3lab_n8n
    restart: unless-stopped
    environment:
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      TZ: Australia/Brisbane
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  upload_tmp:
  chroma_data:
  n8n_data:
