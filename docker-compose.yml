version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: amlkr_postgres
    environment:
      POSTGRES_DB: amlkr_db
      POSTGRES_USER: amlkr
      POSTGRES_PASSWORD: amlkr_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amlkr -d amlkr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amlkr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amlkr_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://amlkr:amlkr_secret@postgres:5432/amlkr_db
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_PATH: /app/chroma_data
      UPLOAD_DIR: /app/tmp
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-amlkr-dashboard}
    volumes:
      - ./backend:/app
      - upload_tmp:/app/tmp
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amlkr_celery
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2 -Q video,images,reports,rag
    environment:
      DATABASE_URL: postgresql+asyncpg://amlkr:amlkr_secret@postgres:5432/amlkr_db
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_PATH: /app/chroma_data
      UPLOAD_DIR: /app/tmp
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-amlkr-dashboard}
    volumes:
      - ./backend:/app
      - upload_tmp:/app/tmp
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
  upload_tmp:
  chroma_data:
