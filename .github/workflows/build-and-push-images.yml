name: Build and Push Images

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "infra/mcp/**"
      - ".github/workflows/build-and-push-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/th3lab-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

  build-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (mcp)
        id: meta_mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/th3lab-mcp
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push mcp image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/mcp
          file: ./infra/mcp/Dockerfile
          push: true
          tags: ${{ steps.meta_mcp.outputs.tags }}
          labels: ${{ steps.meta_mcp.outputs.labels }}
